services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${EVALSTACK_SERVER_PORT:-8000}:8000"
    environment:
      - EVALSTACK_DB_URL=sqlite:////app/data/evalstack.db
      - EVALSTACK_CORS_ORIGINS=${EVALSTACK_CORS_ORIGINS:-*}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - EVALSTACK_JUDGE_MODEL=${EVALSTACK_JUDGE_MODEL:-gpt-4o-mini}
    volumes:
      - evalstack-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./web
    ports:
      - "${EVALSTACK_WEB_PORT:-3000}:3000"
    environment:
      - EVALSTACK_API_BASE=http://server:8000
    depends_on:
      - server
    restart: unless-stopped

volumes:
  evalstack-data:
