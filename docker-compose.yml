services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - EVALSTACK_DB_URL=sqlite:////app/data/evalstack.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - EVALSTACK_JUDGE_MODEL=${EVALSTACK_JUDGE_MODEL:-gpt-4o-mini}
    volumes:
      - evalstack-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  evalstack-data:
