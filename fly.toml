# Fly.io config for the evalstack FastAPI collector + dashboard host.
#
# Free-tier-friendly: one shared-cpu-1x VM, 256 MB RAM, 3 GB persistent volume
# for the SQLite DB. Machine auto-stops on idle (cold start ~1-3 s).
#
# Deploy:
#   flyctl auth login
#   flyctl launch --no-deploy   # one-time; accept the defaults
#   flyctl volume create evalstack_data --region iad --size 3
#   flyctl deploy

app = "evalstack-kartik"  # change if name is taken — flyctl will prompt
primary_region = "iad"     # US East (closest to Boston)

[build]
  dockerfile = "server/Dockerfile"

[env]
  EVALSTACK_DB_URL = "sqlite:////app/data/evalstack.db"
  EVALSTACK_CORS_ORIGINS = "https://evalstack.kartikaneja.com,https://kartikaneja.com,http://localhost:3000,http://localhost:3003"

[[mounts]]
  source = "evalstack_data"
  destination = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
